<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        body{
            text-align:center ;
            font-family: Arial, Helvetica, sans-serif;
        }
        h2{
            font-size: 30px;
        }

        p{
            font-size:30px;
            margin-bottom: 20px;
            
        }
        button{
            padding: 10px 20px;
            margin:15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h2> Counter App</h2>
    <p id = "count">0</p>

    <button onclick = "increase()">+</button>
    <button onclick = "decrease()">-</button>
    <button onclick = "reset()">Rest</button>

    <script>
        let count = 0

        function increase(){
            count++
            document.getElementById("count").innerText = count;
        }

        function decrease(){
            count--
            document.getElementById("count").innerText = count;
        }

        function reset(){
            count = 0
            document.getElementById('count').innerText=count;
        }
    </script>
</body>
</html>
